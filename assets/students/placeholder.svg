<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" role="img" aria-labelledby="title desc">
  <title id="title">Human silhouette</title>
  <desc id="desc">A clean, centered human bust silhouette moved upward within a square frame.</desc>

  <rect width="400" height="400" fill="#121a28"/>

  <!-- Head -->
